name: qr_scanner_app
description: "A fast, accurate QR code scanner that opens scanned URLs in the default browser."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  mobile_scanner: ^7.0.2
  url_launcher: ^6.3.1
  qr_flutter: ^4.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  share_plus: ^13.2.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
